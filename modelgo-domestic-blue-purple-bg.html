<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ModelGo 国内官网</title>
  <style>
    :root {
      --font: "SF Pro Display", Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%; overflow: hidden;
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      background: #020408;
    }

    .page {
      position: relative;
      width: 100vw; height: 100vh; min-height: 700px;
      overflow: hidden;
    }

    canvas#scene {
      position: absolute; inset: 0;
      display: block; width: 100%; height: 100%;
      z-index: 1;
    }

    .grain {
      position: absolute; inset: 0; z-index: 2;
      pointer-events: none; opacity: 0.035;
      mix-blend-mode: overlay;
    }

    .vignette {
      position: absolute; inset: 0; z-index: 3;
      pointer-events: none;
      background:
        radial-gradient(ellipse 65% 50% at 50% 42%, transparent 0%, rgba(2,4,8,0.5) 100%),
        linear-gradient(180deg, rgba(2,4,8,0.2) 0%, transparent 25%, transparent 75%, rgba(2,4,8,0.6) 100%);
    }

    /* ─── Nav ──────────────────────────────── */
    .nav {
      position: absolute; top: 0; left: 0; right: 0;
      z-index: 20;
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px clamp(28px, 5vw, 64px);
    }

    .nav-brand {
      font-size: 17px; font-weight: 600;
      letter-spacing: -0.02em;
      color: rgba(255,255,255,0.88);
    }

    .nav-brand span {
      color: rgba(255,255,255,0.3);
      font-weight: 400;
      margin-left: 6px;
    }

    .nav-links {
      display: flex; align-items: center; gap: 32px;
      list-style: none;
    }

    .nav-links a {
      font-size: 14px; font-weight: 400;
      color: rgba(255,255,255,0.45);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: rgba(255,255,255,0.8); }

    .nav-cta {
      padding: 8px 20px; border-radius: 8px;
      font-size: 13px; font-weight: 500;
      color: #fff !important;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      transition: all 0.2s;
    }

    .nav-cta:hover { background: rgba(255,255,255,0.14) !important; }

    /* ─── Hero ─────────────────────────────── */
    .hero {
      position: relative; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100%;
      padding: 80px clamp(24px, 6vw, 80px) 60px;
      text-align: center;
    }

    .badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 16px 6px 12px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 999px;
      background: rgba(255,255,255,0.035);
      backdrop-filter: blur(16px);
      font-size: 13px; letter-spacing: 0.06em;
      color: rgba(255,255,255,0.45);
      margin-bottom: 36px;
    }

    .badge-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #a78bfa;
      box-shadow: 0 0 8px rgba(167,139,250,0.7);
      animation: pulse-dot 2.5s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { box-shadow: 0 0 8px rgba(167,139,250,0.7); }
      50% { box-shadow: 0 0 16px rgba(167,139,250,1), 0 0 30px rgba(167,139,250,0.4); }
    }

    .title {
      max-width: 860px;
      font-size: clamp(48px, 7vw, 108px);
      font-weight: 700;
      line-height: 1.0;
      letter-spacing: -0.04em;
      color: #fff;
    }

    .title em {
      font-style: normal;
      background: linear-gradient(135deg, #93c5fd 0%, #a78bfa 40%, #c084fc 70%, #818cf8 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      max-width: 540px;
      margin-top: 28px;
      font-size: clamp(15px, 1.3vw, 18px);
      font-weight: 400;
      line-height: 1.8;
      color: rgba(255,255,255,0.38);
    }

    .cta-row {
      display: flex; gap: 14px; margin-top: 48px;
    }

    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 32px; border: none; border-radius: 10px;
      font-size: 15px; font-weight: 500; cursor: pointer;
      transition: all 0.25s ease; text-decoration: none;
      font-family: var(--font);
    }

    .btn-primary {
      color: #fff;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      box-shadow: 0 2px 20px rgba(99,102,241,0.35);
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 32px rgba(99,102,241,0.5);
    }

    .btn-outline {
      color: rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .btn-outline:hover {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.9);
      transform: translateY(-1px);
    }

    .bottom-bar {
      position: absolute; bottom: 0; left: 0; right: 0;
      z-index: 20;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      font-size: 12px;
      color: rgba(255,255,255,0.18);
      letter-spacing: 0.04em;
    }

    @media (max-width: 760px) {
      .nav-links { display: none; }
      .hero { padding-top: 100px; justify-content: flex-start; text-align: left; align-items: flex-start; }
      .cta-row { flex-direction: column; width: 100%; }
      .btn { justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="page">
    <canvas id="scene"></canvas>

    <svg class="grain" width="100%" height="100%">
      <filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="4" stitchTiles="stitch"/></filter>
      <rect width="100%" height="100%" filter="url(#n)"/>
    </svg>

    <div class="vignette"></div>

    <nav class="nav">
      <div class="nav-brand">ModelGo<span>Domestic</span></div>
      <ul class="nav-links">
        <li><a href="#">产品</a></li>
        <li><a href="#">文档</a></li>
        <li><a href="#">定价</a></li>
        <li><a href="#">博客</a></li>
        <li><a href="#" class="nav-cta">控制台</a></li>
      </ul>
    </nav>

    <section class="hero">
      <div class="badge">
        <span class="badge-dot"></span>
        ModelGo · 国内版
      </div>
      <h1 class="title">
        聚合主流大模型<br/>
        <em>构建企业级 AI 用量治理体系</em>
      </h1>
      <p class="subtitle">
        一个接口，接入所有主流大模型。为企业级 AI 应用提供高性能、低延迟、高可用的模型调度服务。
      </p>
      <div class="cta-row">
        <a class="btn btn-primary" href="#">开始使用</a>
        <a class="btn btn-outline" href="#">查看文档</a>
      </div>
    </section>

    <div class="bottom-bar">© 2025 ModelGo · Powered by Intelligence</div>
  </div>

  <script>
    /* ═══════════════════════════════════════════
       Immersive Canvas Scene
       ═══════════════════════════════════════════ */
    const canvas = document.getElementById('scene');
    const ctx = canvas.getContext('2d');
    const DPR = Math.min(window.devicePixelRatio || 1, 2);
    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    let W, H, t = 0, raf;

    /* ── Config ────────────────────────────── */
    const CFG = {
      beams: [
        { x: 0.42, w: 0.14, a: 0.08,  sway: 0.028, amp: 0.025, breath: 0.035, ba: 0.3,  rgb: [180,200,255] },
        { x: 0.55, w: 0.10, a: 0.06,  sway: 0.035, amp: 0.03,  breath: 0.042, ba: 0.35, rgb: [160,180,255] },
        { x: 0.32, w: 0.06, a: 0.035, sway: 0.022, amp: 0.02,  breath: 0.03,  ba: 0.4,  rgb: [140,170,255] },
        { x: 0.68, w: 0.05, a: 0.025, sway: 0.03,  amp: 0.018, breath: 0.048, ba: 0.3,  rgb: [150,160,255] },
      ],

      orbs: [
        { x: 0.35, y: 0.30, r: 0.40, rgb: [25,70,200],  a: 0.20, d: 0.035 },
        { x: 0.65, y: 0.40, r: 0.35, rgb: [110,50,200],  a: 0.16, d: 0.028 },
        { x: 0.50, y: 0.55, r: 0.30, rgb: [40,100,220],  a: 0.12, d: 0.022 },
        { x: 0.75, y: 0.60, r: 0.25, rgb: [90,40,180],   a: 0.10, d: 0.032 },
        { x: 0.25, y: 0.70, r: 0.20, rgb: [50,130,240],  a: 0.08, d: 0.018 },
        { x: 0.55, y: 0.75, r: 0.18, rgb: [120,60,200],  a: 0.06, d: 0.025 },
      ],

      ribbons: [
        { y: 0.58, amp: 40, freq: 0.0045, spd: 0.28, off: 0.6,  thick: 55, blur: 38, lw: 0.7,
          colors: ['rgba(30,70,220,0.07)','rgba(70,50,200,0.20)','rgba(130,60,220,0.07)'],
          line: 'rgba(110,140,255,0.14)' },
        { y: 0.68, amp: 30, freq: 0.006,  spd: 0.40, off: 2.2,  thick: 38, blur: 30, lw: 0.55,
          colors: ['rgba(50,40,200,0.05)','rgba(35,120,255,0.14)','rgba(90,50,210,0.08)'],
          line: 'rgba(90,110,255,0.11)' },
        { y: 0.78, amp: 22, freq: 0.0075, spd: 0.52, off: 4.0,  thick: 26, blur: 24, lw: 0.4,
          colors: ['rgba(60,30,180,0.04)','rgba(30,140,255,0.10)','rgba(80,40,200,0.06)'],
          line: 'rgba(80,100,255,0.08)' },
      ],

      horizon: { y: 0.80, layers: 6, step: 24 },

      particles: { count: 200, colors: [[140,170,255],[170,130,255],[100,180,255],[200,160,255],[120,200,255]] },
    };

    let parts = [];

    /* ── Resize ────────────────────────────── */
    function resize() {
      W = window.innerWidth;
      H = Math.max(window.innerHeight, 700);
      canvas.width = Math.floor(W * DPR);
      canvas.height = Math.floor(H * DPR);
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      spawnParticles();
    }

    function spawnParticles() {
      parts = Array.from({ length: CFG.particles.count }, () => {
        const ci = Math.floor(Math.random() * CFG.particles.colors.length);
        return {
          x: Math.random() * W,
          y: H * 0.1 + Math.random() * H * 0.85,
          r: 0.3 + Math.random() * 2.0,
          vx: (Math.random() - 0.5) * 0.15,
          vy: -0.06 - Math.random() * 0.25,
          phase: Math.random() * Math.PI * 2,
          alpha: 0.08 + Math.random() * 0.35,
          rgb: CFG.particles.colors[ci],
        };
      });
    }

    /* ═══════════════════════════════════════
       Layer 1 — Deep Background + Orb Glows
       ═══════════════════════════════════════ */
    function drawBG() {
      const bg = ctx.createLinearGradient(0, 0, 0, H);
      bg.addColorStop(0, '#060e22');
      bg.addColorStop(0.3, '#040a1a');
      bg.addColorStop(0.6, '#030714');
      bg.addColorStop(1, '#020408');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, W, H);

      for (const o of CFG.orbs) {
        const ox = W * o.x + Math.sin(t * o.d) * W * 0.06;
        const oy = H * o.y + Math.cos(t * o.d * 0.8) * H * 0.04;
        const or = W * o.r;
        const g = ctx.createRadialGradient(ox, oy, 0, ox, oy, or);
        g.addColorStop(0, `rgba(${o.rgb[0]},${o.rgb[1]},${o.rgb[2]},${o.a})`);
        g.addColorStop(0.35, `rgba(${o.rgb[0]},${o.rgb[1]},${o.rgb[2]},${o.a * 0.35})`);
        g.addColorStop(0.7, `rgba(${o.rgb[0]},${o.rgb[1]},${o.rgb[2]},${o.a * 0.08})`);
        g.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(ox, oy, or, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    /* ═══════════════════════════════════════
       Layer 2 — Light Beams from Above
       ═══════════════════════════════════════ */
    function drawBeams() {
      ctx.save();
      ctx.globalCompositeOperation = 'screen';

      for (const b of CFG.beams) {
        const sway = Math.sin(t * b.sway) * b.amp;
        const breath = 1 + Math.sin(t * b.breath) * b.ba;
        const a = b.a * breath;
        const ox = W * (b.x + sway);
        const bw = W * b.w;
        const endY = H * 0.82;
        const topW = bw * 0.35;
        const botW = bw * 1.8;

        const lg = ctx.createLinearGradient(ox, 0, ox, endY);
        lg.addColorStop(0, `rgba(${b.rgb[0]},${b.rgb[1]},${b.rgb[2]},${a * 0.0})`);
        lg.addColorStop(0.04, `rgba(${b.rgb[0]},${b.rgb[1]},${b.rgb[2]},${a * 0.85})`);
        lg.addColorStop(0.12, `rgba(${b.rgb[0]},${b.rgb[1]},${b.rgb[2]},${a})`);
        lg.addColorStop(0.35, `rgba(${b.rgb[0]},${b.rgb[1]},${b.rgb[2]},${a * 0.5})`);
        lg.addColorStop(0.65, `rgba(${b.rgb[0]},${b.rgb[1]},${b.rgb[2]},${a * 0.12})`);
        lg.addColorStop(1, 'rgba(0,0,0,0)');

        ctx.fillStyle = lg;
        ctx.beginPath();
        ctx.moveTo(ox - topW * 0.5, 0);
        ctx.lineTo(ox + topW * 0.5, 0);
        ctx.lineTo(ox + botW * 0.5, endY);
        ctx.lineTo(ox - botW * 0.5, endY);
        ctx.closePath();
        ctx.fill();

        // haze at mid-point
        const hx = ox, hy = endY * 0.35;
        const hg = ctx.createRadialGradient(hx, hy, 0, hx, hy, bw * 1.8);
        hg.addColorStop(0, `rgba(${b.rgb[0]},${b.rgb[1]},${b.rgb[2]},${a * 0.2})`);
        hg.addColorStop(0.5, `rgba(${b.rgb[0]},${b.rgb[1]},${b.rgb[2]},${a * 0.04})`);
        hg.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = hg;
        ctx.beginPath();
        ctx.arc(hx, hy, bw * 1.8, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }

    /* ═══════════════════════════════════════
       Layer 3 — Aurora Ribbons
       ═══════════════════════════════════════ */
    function wave(x, off, amp, f, tv) {
      return Math.sin(x * f + tv + off) * amp
           + Math.sin(x * f * 0.4 + tv * 0.6 + off * 1.5) * amp * 0.4;
    }

    function drawRibbon(r) {
      const baseY = H * r.y;
      const step = 16;
      const top = [], bot = [];

      for (let x = -60; x <= W + 60; x += step) {
        const y = baseY + wave(x, r.off, r.amp, r.freq, t * r.spd);
        const th = r.thick + Math.sin(x * 0.004 + t * 0.4) * r.thick * 0.22;
        top.push(x, y - th);
        bot.push(x, y + th);
      }

      ctx.save();
      ctx.globalCompositeOperation = 'screen';

      const g = ctx.createLinearGradient(0, baseY - 100, W, baseY + 100);
      g.addColorStop(0, r.colors[0]);
      g.addColorStop(0.5, r.colors[1]);
      g.addColorStop(1, r.colors[2]);
      ctx.fillStyle = g;
      ctx.filter = `blur(${r.blur}px)`;
      ctx.beginPath();
      ctx.moveTo(top[0], top[1]);
      for (let i = 2; i < top.length; i += 2) ctx.lineTo(top[i], top[i + 1]);
      for (let i = bot.length - 2; i >= 0; i -= 2) ctx.lineTo(bot[i], bot[i + 1]);
      ctx.closePath();
      ctx.fill();
      ctx.restore();

      // highlight line
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.strokeStyle = r.line;
      ctx.lineWidth = r.lw;
      ctx.filter = 'blur(0.3px)';
      ctx.beginPath();
      for (let i = 0; i < top.length; i += 2) {
        i === 0 ? ctx.moveTo(top[i], top[i + 1]) : ctx.lineTo(top[i], top[i + 1]);
      }
      ctx.stroke();
      ctx.restore();
    }

    /* ═══════════════════════════════════════
       Layer 4 — Horizon Arcs
       ═══════════════════════════════════════ */
    function drawHorizon() {
      const baseY = H * CFG.horizon.y;
      ctx.save();
      ctx.globalCompositeOperation = 'screen';

      for (let i = 0; i < CFG.horizon.layers; i++) {
        const g = ctx.createLinearGradient(0, baseY - 40, W, baseY + 60);
        g.addColorStop(0, `rgba(45,65,220,${0.012 + i * 0.004})`);
        g.addColorStop(0.5, `rgba(25,170,255,${0.018 + i * 0.005})`);
        g.addColorStop(1, 'rgba(0,0,0,0)');

        ctx.strokeStyle = g;
        ctx.lineWidth = 0.6 + i * 0.25;
        ctx.beginPath();
        for (let x = -60; x <= W + 60; x += CFG.horizon.step) {
          const cy = baseY
            + Math.sin(x * 0.002 + t * 0.15 + i) * (12 + i * 3)
            + Math.pow((x - W * 0.5) / W, 2) * (60 + i * 12)
            + i * 8;
          x === -60 ? ctx.moveTo(x, cy) : ctx.lineTo(x, cy);
        }
        ctx.stroke();
      }

      ctx.restore();
    }

    /* ═══════════════════════════════════════
       Layer 5 — Floating Particles
       ═══════════════════════════════════════ */
    function drawParticles() {
      ctx.save();
      ctx.globalCompositeOperation = 'screen';

      for (const p of parts) {
        const dx = Math.sin(t * 0.25 + p.phase) * 20;
        const dy = Math.cos(t * 0.18 + p.phase * 1.1) * 10;
        const x = p.x + dx;
        const y = p.y + dy;
        const depth = 1 - Math.abs(y / H - 0.5) * 1.4;
        const a = Math.max(0, p.alpha * depth);
        if (a < 0.012) continue;

        // glow halo
        if (p.r > 1.2) {
          ctx.fillStyle = `rgba(${p.rgb[0]},${p.rgb[1]},${p.rgb[2]},${a * 0.08})`;
          ctx.beginPath();
          ctx.arc(x, y, p.r * 5, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.fillStyle = `rgba(${p.rgb[0]},${p.rgb[1]},${p.rgb[2]},${a})`;
        ctx.beginPath();
        ctx.arc(x, y, p.r, 0, Math.PI * 2);
        ctx.fill();

        // slow drift
        p.x += p.vx + Math.sin(t * 0.1 + p.phase) * 0.02;
        p.y += p.vy;
        if (p.y < -20) { p.y = H + 20; p.x = Math.random() * W; }
        if (p.x < -20) p.x = W + 20;
        if (p.x > W + 20) p.x = -20;
      }

      ctx.restore();
    }

    /* ═══════════════════════════════════════
       Layer 6 — Soft Top Glow (light source)
       ═══════════════════════════════════════ */
    function drawTopGlow() {
      const cx = W * 0.5 + Math.sin(t * 0.02) * W * 0.08;
      const cy = H * 0.05;
      const rw = W * 0.5;
      const rh = H * 0.35;
      const a = 0.06 + Math.sin(t * 0.03) * 0.02;
      const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, rw);
      g.addColorStop(0, `rgba(180,200,255,${a})`);
      g.addColorStop(0.3, `rgba(140,160,255,${a * 0.4})`);
      g.addColorStop(0.6, `rgba(100,120,255,${a * 0.1})`);
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.ellipse(cx, cy, rw, rh, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    /* ═══════════════════════════════════════
       Render Loop
       ═══════════════════════════════════════ */
    function loop(ts) {
      t = ts * 0.001;
      drawBG();
      drawTopGlow();
      drawBeams();
      for (const r of CFG.ribbons) drawRibbon(r);
      drawHorizon();
      drawParticles();
      if (!reduced) raf = requestAnimationFrame(loop);
    }

    window.addEventListener('resize', resize);
    resize();
    raf = requestAnimationFrame(loop);
  </script>
</body>
</html>
