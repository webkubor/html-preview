<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>HTML Preview · webkubor 设计稿预览</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f5f1ea;
      color: #2b2723;
      font-family: 'Songti SC', 'Noto Serif SC', Georgia, serif;
      padding: 24px;
    }
    .card {
      max-width: 520px;
      text-align: center;
      padding: 56px 40px;
      background: #fdfbf7;
      border: 1px solid #e4ddd2;
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(43, 39, 35, 0.06);
    }
    h1 { font-size: 26px; font-weight: 600; letter-spacing: 0.04em; margin-bottom: 14px; }
    p { font-size: 14.5px; line-height: 1.8; color: #6f6659; margin-bottom: 8px; }
    a {
      display: inline-block;
      margin-top: 22px;
      font-size: 13.5px;
      color: #8a6f4d;
      text-decoration: none;
      border: 1px solid #d9cfc0;
      padding: 9px 22px;
      border-radius: 8px;
      transition: all .2s;
    }
    a:hover { border-color: #8a6f4d; }
  </style>
</head>
<body>
  <main class="card">
    <h1>HTML Preview</h1>
    <p>webkubor 的 UI 设计稿预览站。</p>
    <p>作品目录整理中，新的个人设计稿会陆续放上来。</p>
    <a href="https://webkubor.online">← 回主站 webkubor.online</a>
  </main>
</body>
</html>
