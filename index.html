<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>栖洲的 UI 集锦</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --hover: #14141e;
    --border: #1e1e2a;
    --text: #e8e8f0;
    --muted: #6a6a7a;
  }

  body {
    font-family: 'Inter', -apple-system, 'PingFang SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .header {
    padding: 80px 8vw 48px;
  }

  .header h1 {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  .header p {
    margin-top: 8px;
    font-size: 14px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .list {
    padding: 0 8vw 80px;
    border-top: 1px solid var(--border);
  }

  .item {
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 20px 0;
    border-bottom: 1px solid var(--border);
    text-decoration: none;
    color: var(--text);
    transition: background 0.15s, padding 0.15s;
  }

  .item:hover {
    background: var(--hover);
    padding-left: 12px;
    padding-right: 12px;
    margin: 0 -12px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .item-title {
    font-size: 16px;
    font-weight: 500;
    min-width: 200px;
  }

  .item-sub {
    font-size: 13px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .item-cat {
    margin-left: auto;
    font-size: 12px;
    color: var(--muted);
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 4px;
    white-space: nowrap;
  }

  .item-arrow {
    color: var(--muted);
    font-size: 18px;
    transition: color 0.15s, transform 0.15s;
  }

  .item:hover .item-arrow {
    color: var(--text);
    transform: translateX(4px);
  }

  .footer {
    padding: 0 8vw 48px;
    font-size: 12px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }
</style>
</head>
<body>

<div class="header">
  <h1>栖洲的 UI 集锦</h1>
  <p>AI-generated UI experiments</p>
</div>

<div class="list" id="list"></div>

<div class="footer">
  Built with Vite · Deployed on Cloudflare Pages
</div>

<script>
  const pages = [
    { file: 'purple-hero.html', title: 'AI 用量治理', sub: '紫色首屏 Hero', accent: '#7c3aed', cat: 'Hero' },
    { file: 'modelgo-domestic-blue-purple-bg.html', title: 'ModelGo 国内官网', sub: '蓝紫粒子背景', accent: '#6366f1', cat: 'Background' },
    { file: 'modelgo-domestic-hero-motion.html', title: '次元共生', sub: '首屏动效', accent: '#a855f7', cat: 'Motion' },
    { file: 'modelgo-domestic-reimagined.html', title: 'AI 用量治理体系', sub: '企业级落地页', accent: '#3b82f6', cat: 'Landing' },
    { file: 'ai-gateway-hero.html', title: 'AI 网关聚合', sub: '主流大模型聚合', accent: '#8b5cf6', cat: 'Hero' },
    { file: 'business-reimagined.html', title: '次元共生 · 企业版', sub: '企业级 AI 用量治理', accent: '#b052ef', cat: 'Enterprise' },
  ];

  const list = document.getElementById('list');
  list.innerHTML = pages.map(p => `
    <a class="item" href="${p.file}">
      <span class="dot" style="background:${p.accent}"></span>
      <span class="item-title">${p.title}</span>
      <span class="item-sub">${p.sub}</span>
      <span class="item-cat">${p.cat}</span>
      <span class="item-arrow">→</span>
    </a>
  `).join('');
</script>

</body>
</html>
