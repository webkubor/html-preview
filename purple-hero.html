<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI 用量治理</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, sans-serif; background: #000; color: #fff; overflow: hidden; height: 100vh; width: 100vw; }
  #c { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; }
  .grid-overlay { position: fixed; inset: 0; z-index: 1; pointer-events: none; background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px); background-size: 80px 80px; }
  .cross-markers { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
  .cross { position: absolute; width: 12px; height: 12px; }
  .cross::before, .cross::after { content: ''; position: absolute; background: rgba(255,255,255,0.045); }
  .cross::before { width: 1px; height: 12px; left: 50%; top: 0; transform: translateX(-50%); }
  .cross::after { width: 12px; height: 1px; top: 50%; left: 0; transform: translateY(-50%); }
  .content { position: relative; z-index: 3; height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 0 10vw; }
  .hero h1 { font-size: clamp(38px, 5vw, 76px); font-weight: 300; line-height: 1.12; letter-spacing: -0.015em; margin-bottom: 28px; opacity: 0; transform: translateY(30px); animation: fadeUp 1s ease-out 0.3s forwards; }
  .hero h1 span { display: block; }
  .hero .line { width: 56px; height: 2px; background: linear-gradient(90deg, #60a5fa, #a78bfa, #c084fc); border-radius: 1px; opacity: 0; animation: fadeUp 1s ease-out 0.6s forwards; }
  .bottom-left { position: fixed; bottom: 8vh; left: 10vw; z-index: 3; opacity: 0; animation: fadeUp 1s ease-out 0.9s forwards; }
  .bottom-left .tagline { font-size: clamp(12px, 1.1vw, 15px); font-weight: 400; color: rgba(255,255,255,0.4); line-height: 1.7; }
  .bottom-left .features { margin-top: 10px; font-size: clamp(11px, 0.9vw, 13px); font-weight: 400; color: rgba(255,255,255,0.25); letter-spacing: 0.03em; }
  .side-nav { position: fixed; right: 6vw; top: 50%; transform: translateY(-50%); z-index: 3; display: flex; flex-direction: column; }
  .nav-item { padding: 22px 0; cursor: pointer; transition: all 0.4s cubic-bezier(0.22,1,0.36,1); opacity: 0.3; position: relative; }
  .nav-item.active { opacity: 1; }
  .nav-item:hover { opacity: 0.7; }
  .nav-item .num { font-size: clamp(24px, 2.8vw, 36px); font-weight: 300; color: rgba(255,255,255,0.6); line-height: 1; transition: color 0.4s; }
  .nav-item.active .num { color: #fff; }
  .nav-item .label { font-size: clamp(11px, 0.9vw, 13px); font-weight: 400; color: rgba(255,255,255,0.3); margin-top: 5px; text-transform: uppercase; letter-spacing: 0.1em; transition: color 0.4s; }
  .nav-item.active .label { color: rgba(255,255,255,0.55); }
  .nav-divider { width: 32px; height: 1px; background: rgba(255,255,255,0.06); margin: 0 auto; }
  .nav-item .indicator { position: absolute; right: -24px; top: 50%; transform: translateY(-50%); width: 3px; height: 0; background: linear-gradient(180deg, #60a5fa, #a78bfa); border-radius: 2px; transition: height 0.4s cubic-bezier(0.22,1,0.36,1); }
  .nav-item.active .indicator { height: 40px; }
  .stats { position: fixed; bottom: 8vh; right: 6vw; z-index: 3; display: flex; gap: 40px; opacity: 0; animation: fadeUp 1s ease-out 1.1s forwards; }
  .stat { text-align: right; }
  .stat .val { font-size: clamp(28px, 3vw, 42px); font-weight: 300; color: rgba(255,255,255,0.85); line-height: 1; }
  .stat .unit { font-size: clamp(11px, 0.85vw, 13px); color: rgba(255,255,255,0.3); margin-top: 6px; letter-spacing: 0.05em; }
  .cta { position: fixed; bottom: 8vh; left: 50%; transform: translateX(-50%); z-index: 3; display: flex; gap: 16px; opacity: 0; animation: fadeUp 1s ease-out 1.3s forwards; }
  .cta button { padding: 14px 36px; border-radius: 10px; font-size: 14px; font-family: inherit; font-weight: 500; cursor: pointer; transition: all 0.3s; border: none; }
  .cta .primary { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; box-shadow: 0 4px 24px rgba(99,102,241,0.3); }
  .cta .primary:hover { box-shadow: 0 6px 32px rgba(99,102,241,0.45); transform: translateY(-1px); }
  .cta .ghost { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.1); }
  .cta .ghost:hover { background: rgba(255,255,255,0.1); color: #fff; }
  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
  .tooltip { position: fixed; z-index: 10; background: rgba(15,15,25,0.92); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 16px 20px; pointer-events: none; opacity: 0; transition: opacity 0.25s; max-width: 260px; }
  .tooltip.show { opacity: 1; }
  .tooltip .tt-title { font-size: 13px; font-weight: 500; color: #fff; margin-bottom: 6px; }
  .tooltip .tt-desc { font-size: 12px; color: rgba(255,255,255,0.45); line-height: 1.5; }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div class="grid-overlay"></div>
<div class="cross-markers" id="crossMarkers"></div>

<div class="content">
  <div class="hero">
    <h1><span>聚合主流大模型</span><span>构建企业级 AI 用量治理体系</span></h1>
    <div class="line"></div>
  </div>
</div>

<div class="bottom-left">
  <div class="tagline">一站式 AI 网关<br>统一管理与治理</div>
  <div class="features">安全 &nbsp;•&nbsp; 可靠 &nbsp;•&nbsp; 面向未来</div>
</div>

<div class="stats">
  <div class="stat"><div class="val" id="stat1">0</div><div class="unit">接入模型</div></div>
  <div class="stat"><div class="val" id="stat2">0</div><div class="unit">日均调用</div></div>
  <div class="stat"><div class="val" id="stat3">0%</div><div class="unit">可用性</div></div>
</div>

<div class="side-nav">
  <div class="nav-item active" data-i="0"><div class="num">01</div><div class="label">聚合</div><div class="indicator"></div></div>
  <div class="nav-divider"></div>
  <div class="nav-item" data-i="1"><div class="num">02</div><div class="label">治理</div><div class="indicator"></div></div>
  <div class="nav-divider"></div>
  <div class="nav-item" data-i="2"><div class="num">03</div><div class="label">监控</div><div class="indicator"></div></div>
  <div class="nav-divider"></div>
  <div class="nav-item" data-i="3"><div class="num">04</div><div class="label">扩展</div><div class="indicator"></div></div>
</div>

<div class="cta">
  <button class="primary">开始使用</button>
  <button class="ghost">了解更多</button>
</div>

<div class="tooltip" id="tooltip"><div class="tt-title"></div><div class="tt-desc"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const crosses = document.getElementById('crossMarkers');
for (let gx = 0; gx < 18; gx++) for (let gy = 0; gy < 12; gy++) {
  const c = document.createElement('div'); c.className = 'cross';
  c.style.left = (gx*80+40)+'px'; c.style.top = (gy*80+40)+'px';
  crosses.appendChild(c);
}

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1,1,1,-1,0,1);

const uniforms = {
  u_time: { value: 0 },
  u_mouse: { value: new THREE.Vector2(0.5, 0.5) },
  u_res: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) }
};

const frag = `
precision highp float;
uniform float u_time;
uniform vec2 u_mouse;
uniform vec2 u_res;

// --- Simplex 3D ---
vec4 permute(vec4 x){return mod(((x*34.0)+1.0)*x,289.0);}
vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}

float snoise(vec3 v){
  const vec2 C=vec2(1./6.,1./3.);
  const vec4 D=vec4(0.,.5,1.,2.);
  vec3 i=floor(v+dot(v,C.yyy));
  vec3 x0=v-i+dot(i,C.xxx);
  vec3 g=step(x0.yzx,x0.xyz);
  vec3 l=1.-g;
  vec3 i1=min(g.xyz,l.zxy);
  vec3 i2=max(g.xyz,l.zxy);
  vec3 x1=x0-i1+C.xxx;
  vec3 x2=x0-i2+C.yyy;
  vec3 x3=x0-D.yyy;
  i=mod(i,289.);
  vec4 p=permute(permute(permute(
    i.z+vec4(0.,i1.z,i2.z,1.))
    +i.y+vec4(0.,i1.y,i2.y,1.))
    +i.x+vec4(0.,i1.x,i2.x,1.));
  float n_=1./7.;
  vec3 ns=n_*D.wyz-D.xzx;
  vec4 j=p-49.*floor(p*ns.z*ns.z);
  vec4 x_=floor(j*ns.z);
  vec4 y_=floor(j-7.*x_);
  vec4 x=x_*ns.x+ns.yyyy;
  vec4 y=y_*ns.x+ns.yyyy;
  vec4 h=1.-abs(x)-abs(y);
  vec4 b0=vec4(x.xy,y.xy);
  vec4 b1=vec4(x.zw,y.zw);
  vec4 s0=floor(b0)*2.+1.;
  vec4 s1=floor(b1)*2.+1.;
  vec4 sh=-step(h,vec4(0.));
  vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;
  vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
  vec3 p0=vec3(a0.xy,h.x);
  vec3 p1=vec3(a0.zw,h.y);
  vec3 p2=vec3(a1.xy,h.z);
  vec3 p3=vec3(a1.zw,h.w);
  vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
  p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;
  vec4 m=max(.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.);
  m=m*m;
  return 42.*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
}

void main(){
  vec2 uv=gl_FragCoord.xy/u_res;
  float t=u_time*0.06;
  vec2 m=u_mouse;

  // warp UV with flowing noise — scattered, not clumped
  vec2 q=vec2(
    snoise(vec3(uv*1.2, t*0.7)),
    snoise(vec3(uv*1.2+100., t*0.7))
  );
  vec2 q2=vec2(
    snoise(vec3(uv*2.4+q*1.8, t*0.5+30.)),
    snoise(vec3(uv*2.4+q*1.8+100., t*0.5+30.))
  );
  vec2 warped=uv+q*0.25+q2*0.12;

  // multiple flowing layers — scattered across screen
  float f1=snoise(vec3(warped*1.5, t*0.8));
  float f2=snoise(vec3(warped*2.8+50., t*0.6+10.));
  float f3=snoise(vec3(warped*0.8+q*0.6, t*0.4+20.));
  float f4=snoise(vec3(warped*3.5+q2*0.4, t*0.35+40.));

  // combine into flowing ribbons
  float ribbon=f1*0.35+f2*0.25+f3*0.25+f4*0.15;
  ribbon=ribbon*0.5+0.5; // 0..1

  // color palette: deep navy → blue → purple → magenta
  vec3 c0=vec3(0.01,0.01,0.04);   // near black
  vec3 c1=vec3(0.03,0.04,0.12);   // deep navy
  vec3 c2=vec3(0.06,0.08,0.28);   // blue
  vec3 c3=vec3(0.12,0.04,0.42);   // purple
  vec3 c4=vec3(0.28,0.06,0.62);   // bright purple
  vec3 c5=vec3(0.45,0.1,0.8);     // magenta
  vec3 c6=vec3(0.6,0.15,0.95);    // bright magenta

  vec3 col=c0;
  col=mix(col,c1,smoothstep(0.0,0.15,ribbon));
  col=mix(col,c2,smoothstep(0.15,0.3,ribbon));
  col=mix(col,c3,smoothstep(0.3,0.45,ribbon));
  col=mix(col,c4,smoothstep(0.45,0.6,ribbon));
  col=mix(col,c5,smoothstep(0.6,0.78,ribbon));
  col=mix(col,c6,smoothstep(0.78,1.0,ribbon));

  // scattered glow streaks — not clustered
  float streak1=smoothstep(0.52,0.6,ribbon)*smoothstep(0.72,0.6,ribbon);
  float streak2=smoothstep(0.68,0.76,f2*0.5+0.5)*smoothstep(0.88,0.76,f2*0.5+0.5);
  float streak3=smoothstep(0.44,0.52,f3*0.5+0.5)*smoothstep(0.64,0.52,f3*0.5+0.5);

  col+=vec3(0.3,0.08,0.6)*streak1*0.35;
  col+=vec3(0.15,0.12,0.5)*streak2*0.25;
  col+=vec3(0.35,0.05,0.7)*streak3*0.3;

  // mouse glow — subtle
  float md=length(uv-m);
  col+=vec3(0.08,0.02,0.18)*smoothstep(0.45,0.0,md)*0.3;

  // vignette
  float vig=1.-length((uv-.5)*vec2(1.1,1.3));
  vig=smoothstep(0.,.7,vig);
  col*=vig*.85+.15;

  gl_FragColor=vec4(col,1.);
}
`;

scene.add(new THREE.Mesh(
  new THREE.PlaneGeometry(2,2),
  new THREE.ShaderMaterial({ fragmentShader: frag, uniforms })
));

let mT={x:.5,y:.5},mS={x:.5,y:.5};
document.addEventListener('mousemove',e=>{
  mT.x=e.clientX/window.innerWidth;
  mT.y=1-e.clientY/window.innerHeight;
});

(function loop(t){
  requestAnimationFrame(loop);
  mS.x+=(mT.x-mS.x)*.025;
  mS.y+=(mT.y-mS.y)*.025;
  uniforms.u_time.value=t*.001;
  uniforms.u_mouse.value.set(mS.x,mS.y);
  renderer.render(scene,camera);
})(0);

window.addEventListener('resize',()=>{
  renderer.setSize(innerWidth,innerHeight);
  uniforms.u_res.value.set(innerWidth,innerHeight);
});

// Nav
const navItems=document.querySelectorAll('.nav-item');
const descs=[
  {t:'聚合',d:'一键接入 GPT、Claude、Gemini、通义等主流大模型，统一 API 网关'},
  {t:'治理',d:'细粒度权限管控、用量配额、成本分析，全面治理企业 AI 用量'},
  {t:'监控',d:'实时流量监控、异常告警、调用链追踪，保障服务稳定可靠'},
  {t:'扩展',d:'插件化架构，支持自定义策略、模型路由、负载均衡'}
];
const tt=document.getElementById('tooltip');
navItems.forEach((it,i)=>{
  it.onclick=()=>{navItems.forEach(n=>n.classList.remove('active'));it.classList.add('active');};
  it.onmouseenter=()=>{
    const r=it.getBoundingClientRect();
    tt.querySelector('.tt-title').textContent=descs[i].t;
    tt.querySelector('.tt-desc').textContent=descs[i].d;
    tt.style.left=(r.left-280)+'px';tt.style.top=r.top+'px';
    tt.classList.add('show');
  };
  it.onmouseleave=()=>tt.classList.remove('show');
});

function animC(el,tg,s=''){const d=2000,st=performance.now();(function u(n){const p=Math.min((n-st)/d,1);el.textContent=Math.round((1-Math.pow(1-p,3))*tg).toLocaleString()+s;if(p<1)requestAnimationFrame(u)})(st);}
setTimeout(()=>{animC(document.getElementById('stat1'),200,'+');animC(document.getElementById('stat2'),5000,'万');animC(document.getElementById('stat3'),99.9,'%');},800);
</script>
</body>
</html>
