<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ModelGo 国内官网首屏动效预览</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #030713;
      --ink: #f7f8ff;
      --muted: rgba(231, 236, 255, 0.68);
      --weak: rgba(231, 236, 255, 0.42);
      --line: rgba(183, 197, 255, 0.18);
      --purple: #7b4dff;
      --violet: #b245ff;
      --pink: #ee5bdb;
      --blue: #206dff;
      --cyan: #3ac7ff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      overflow: hidden;
      font-family:
        Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    body {
      color: var(--ink);
    }

    .hero {
      position: relative;
      width: 100vw;
      height: 100vh;
      min-height: 760px;
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(circle at 72% 18%, rgba(255, 92, 221, 0.46), transparent 38%),
        radial-gradient(circle at 52% 54%, rgba(166, 61, 255, 0.50), transparent 43%),
        radial-gradient(circle at 62% 86%, rgba(43, 86, 255, 0.42), transparent 42%),
        radial-gradient(circle at 10% 38%, rgba(75, 92, 220, 0.22), transparent 44%),
        linear-gradient(145deg, #030713 0%, #19185e 40%, #5c18b7 72%, #070b22 100%);
      background-size: 145% 145%, 135% 135%, 150% 150%, 130% 130%, 100% 100%;
      animation: heroBreath 8s ease-in-out infinite alternate;
    }

    .glow-field,
    .grid,
    .motion-canvas,
    .grain,
    .vignette,
    .shape,
    .beam,
    .scan {
      position: absolute;
      pointer-events: none;
    }

    .glow-field {
      inset: -18%;
      z-index: 0;
      background:
        conic-gradient(from 130deg at 52% 52%, transparent 0deg, rgba(61, 96, 255, 0.24) 64deg, rgba(181, 60, 255, 0.50) 144deg, rgba(255, 92, 220, 0.40) 210deg, rgba(42, 119, 255, 0.26) 292deg, transparent 360deg);
      filter: blur(62px);
      opacity: 0.96;
      animation: drift 8s ease-in-out infinite alternate;
    }

    .beam {
      inset: 8% -16% auto -16%;
      z-index: 1;
      height: 68%;
      background:
        linear-gradient(112deg, transparent 0%, rgba(61, 120, 255, 0.24) 20%, rgba(189, 62, 255, 0.58) 52%, rgba(255, 91, 222, 0.34) 74%, transparent 100%);
      filter: blur(46px);
      opacity: 0.84;
      transform: rotate(-2deg);
      animation: beamMove 7s ease-in-out infinite alternate;
    }

    .motion-canvas {
      inset: 0;
      z-index: 2;
      width: 100%;
      height: 100%;
      opacity: 0.92;
      mix-blend-mode: screen;
    }

    .scan {
      top: -20%;
      left: -32%;
      z-index: 5;
      width: 42%;
      height: 150%;
      background:
        linear-gradient(90deg, transparent 0%, rgba(171, 113, 255, 0.00) 28%, rgba(199, 120, 255, 0.24) 48%, rgba(72, 149, 255, 0.18) 54%, transparent 76%);
      filter: blur(28px);
      transform: rotate(18deg);
      animation: scanMove 8s ease-in-out infinite;
    }

    .grid {
      inset: 0;
      z-index: 5;
      opacity: 0.52;
      background-image:
        linear-gradient(rgba(232, 236, 255, 0.060) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232, 236, 255, 0.052) 1px, transparent 1px);
      background-size: 92px 92px;
      mask-image: linear-gradient(to bottom, transparent 0%, black 10%, black 84%, transparent 100%);
      animation: gridSlide 12s linear infinite;
    }

    .grid::before {
      position: absolute;
      inset: 0;
      content: "";
      background-image:
        radial-gradient(circle, rgba(255, 255, 255, 0.22) 0 1px, transparent 1.5px),
        radial-gradient(circle, rgba(255, 255, 255, 0.18) 0 1px, transparent 1.5px);
      background-size: 258px 258px, 430px 430px;
      background-position: 0 0, 120px 82px;
      opacity: 0.34;
      animation: stars 3.6s ease-in-out infinite alternate;
    }

    .grain {
      inset: 0;
      z-index: 8;
      opacity: 0.07;
      mix-blend-mode: screen;
      background-image:
        radial-gradient(circle at 25% 20%, rgba(255,255,255,0.9) 0 1px, transparent 1.2px),
        radial-gradient(circle at 72% 64%, rgba(255,255,255,0.75) 0 1px, transparent 1.2px);
      background-size: 7px 7px, 11px 11px;
    }

    .vignette {
      inset: 0;
      z-index: 7;
      background:
        radial-gradient(circle at 56% 50%, transparent 0 42%, rgba(3, 7, 19, 0.24) 72%, rgba(3, 7, 19, 0.88) 100%),
        linear-gradient(90deg, rgba(3, 7, 19, 0.54) 0%, transparent 32%, rgba(3, 7, 19, 0.16) 68%, rgba(3, 7, 19, 0.50) 100%),
        linear-gradient(180deg, rgba(3, 7, 19, 0.18) 0%, transparent 38%, rgba(3, 7, 19, 0.66) 100%);
    }

    .shape {
      z-index: 4;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background:
        radial-gradient(circle at 63% 78%, rgba(251, 210, 255, 0.72), rgba(159, 72, 255, 0.66) 34%, rgba(72, 54, 185, 0.22) 67%, transparent 84%);
      box-shadow:
        inset 0 0 42px rgba(255, 255, 255, 0.30),
        inset 0 -34px 74px rgba(50, 27, 126, 0.28),
        0 0 76px rgba(165, 78, 255, 0.66),
        0 0 170px rgba(83, 80, 255, 0.40);
      filter: saturate(1.22) blur(0.2px);
      transform: translateZ(0);
    }

    .shape::before {
      position: absolute;
      inset: 0;
      content: "";
      border-radius: inherit;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.34), transparent 34%),
        radial-gradient(circle at 55% 78%, rgba(255, 255, 255, 0.28), transparent 34%);
      mix-blend-mode: screen;
      opacity: 0.58;
    }

    .shape-top-left {
      top: -39vh;
      left: -8vw;
      width: 42vw;
      height: 54vh;
      border-radius: 0 0 42% 0;
      animation: cornerFloatA 7s ease-in-out infinite alternate;
    }

    .shape-top-right {
      top: 14vh;
      right: -13vw;
      width: 34vw;
      height: 25vh;
      border-radius: 46% 0 0 48%;
      background:
        radial-gradient(circle at 13% 52%, rgba(255, 197, 251, 0.82), rgba(235, 75, 222, 0.56) 35%, rgba(92, 42, 184, 0.24) 70%, transparent 88%);
      animation: cornerFloatB 8.5s ease-in-out infinite alternate;
    }

    .shape-bottom-left {
      bottom: -29vh;
      left: -8vw;
      width: 41vw;
      height: 40vh;
      border-radius: 0 42% 0 0;
      background:
        radial-gradient(circle at 72% 8%, rgba(255, 173, 242, 0.78), rgba(197, 68, 224, 0.52) 38%, rgba(65, 54, 164, 0.20) 76%, transparent 88%);
      animation: cornerFloatC 9s ease-in-out infinite alternate;
    }

    .shape-bottom-right {
      right: -9vw;
      bottom: -22vh;
      width: 50vw;
      height: 39vh;
      border-radius: 42% 0 0 0;
      background:
        radial-gradient(circle at 15% 12%, rgba(202, 216, 255, 0.88), rgba(57, 130, 255, 0.62) 34%, rgba(72, 64, 210, 0.28) 70%, transparent 86%);
      animation: cornerFloatD 8s ease-in-out infinite alternate;
    }

    .content {
      position: relative;
      z-index: 9;
      display: flex;
      align-items: center;
      width: min(1680px, 100vw);
      height: 100%;
      padding: clamp(70px, 8vw, 132px);
      padding-top: clamp(110px, 12vw, 150px);
    }

    .copy {
      max-width: min(720px, 52vw);
      transform: translateY(10vh);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 26px;
      color: rgba(246, 248, 255, 0.76);
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .eyebrow::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--violet);
      box-shadow: 0 0 22px rgba(178, 69, 255, 0.9);
    }

    h1 {
      margin: 0;
      max-width: 760px;
      font-size: clamp(58px, 6.4vw, 112px);
      line-height: 1.02;
      letter-spacing: -0.04em;
      color: rgba(246, 248, 255, 0.86);
      text-wrap: balance;
      text-shadow:
        0 18px 78px rgba(46, 98, 255, 0.34),
        0 4px 26px rgba(210, 84, 255, 0.26);
    }

    .gradient-word {
      color: transparent;
      background: linear-gradient(100deg, rgba(255, 255, 255, 0.94) 0%, rgba(223, 226, 255, 0.88) 36%, rgba(221, 120, 255, 0.84) 68%, rgba(126, 170, 255, 0.86) 100%);
      background-clip: text;
      -webkit-background-clip: text;
    }

    @keyframes heroBreath {
      0% {
        background-position: 70% 18%, 52% 54%, 62% 86%, 10% 38%, 0 0;
        filter: saturate(1) brightness(1);
      }
      100% {
        background-position: 78% 24%, 48% 48%, 54% 78%, 14% 44%, 0 0;
        filter: saturate(1.14) brightness(1.06);
      }
    }

    @keyframes drift {
      0% { transform: translate3d(-5%, -3%, 0) scale(1) rotate(-4deg); }
      100% { transform: translate3d(6%, 4%, 0) scale(1.16) rotate(5deg); }
    }

    @keyframes beamMove {
      0% { transform: translate3d(-10%, -4%, 0) rotate(-5deg); opacity: 0.54; }
      45% { transform: translate3d(3%, 2%, 0) rotate(0deg); opacity: 0.96; }
      100% { transform: translate3d(12%, 7%, 0) rotate(4deg); opacity: 0.72; }
    }

    @keyframes scanMove {
      0% { transform: translate3d(-20vw, 0, 0) rotate(18deg); opacity: 0; }
      16% { opacity: 0.6; }
      58% { opacity: 0.42; }
      100% { transform: translate3d(160vw, 0, 0) rotate(18deg); opacity: 0; }
    }

    @keyframes gridSlide {
      0% { background-position: 0 0, 0 0; }
      100% { background-position: 92px 92px, 92px 92px; }
    }

    @keyframes stars {
      0% { opacity: 0.18; transform: translateY(0); }
      100% { opacity: 0.42; transform: translateY(-18px); }
    }

    @keyframes cornerFloatA {
      0% { transform: translate3d(0, 0, 0) scale(1) rotate(0deg); }
      100% { transform: translate3d(-3.2vw, 3.4vh, 0) scale(1.08) rotate(-2deg); }
    }

    @keyframes cornerFloatB {
      0% { transform: translate3d(0, 0, 0) scale(1) rotate(0deg); }
      100% { transform: translate3d(4vw, -3vh, 0) scale(1.1) rotate(3deg); }
    }

    @keyframes cornerFloatC {
      0% { transform: translate3d(0, 0, 0) scale(1) rotate(0deg); }
      100% { transform: translate3d(4.4vw, -3.2vh, 0) scale(1.08) rotate(2deg); }
    }

    @keyframes cornerFloatD {
      0% { transform: translate3d(0, 0, 0) scale(1) rotate(0deg); }
      100% { transform: translate3d(-4.2vw, -3.8vh, 0) scale(1.12) rotate(-2deg); }
    }

    @media (max-width: 720px) {
      .hero {
        min-height: 720px;
      }

      .content {
        padding: 112px 28px 92px;
        align-items: start;
      }

      .copy {
        transform: none;
      }

      .copy {
        max-width: 100%;
        transform: translateY(18vh);
      }

      .shape-top-left {
        width: 76vw;
      }

      .shape-bottom-right {
        width: 86vw;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <main class="hero" aria-label="ModelGo 国内官网首屏动效预览">
    <canvas class="motion-canvas" id="motionCanvas" aria-hidden="true"></canvas>
    <div class="glow-field"></div>
    <div class="beam"></div>
    <div class="scan"></div>
    <div class="shape shape-top-left"></div>
    <div class="shape shape-top-right"></div>
    <div class="shape shape-bottom-left"></div>
    <div class="shape shape-bottom-right"></div>
    <div class="grid"></div>
    <div class="vignette"></div>
    <div class="grain"></div>

    <section class="content">
      <div class="copy">
        <h1>
          构建企业级
          <span class="gradient-word">AI 用量治理</span>
        </h1>
      </div>
    </section>
  </main>
  <script>
    const canvas = document.getElementById('motionCanvas')
    const ctx = canvas.getContext('2d')
    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches
    const state = { width: 0, height: 0, dpr: 1, points: [], ribbons: [] }
    let raf = 0

    function resize() {
      state.dpr = Math.min(window.devicePixelRatio || 1, 2)
      state.width = window.innerWidth
      state.height = window.innerHeight
      canvas.width = Math.floor(state.width * state.dpr)
      canvas.height = Math.floor(state.height * state.dpr)
      canvas.style.width = `${state.width}px`
      canvas.style.height = `${state.height}px`
      ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0)
    }

    function seed() {
      state.points = Array.from({ length: 36 }, (_, index) => ({
        x: Math.random() * state.width,
        y: Math.random() * state.height,
        r: 0.7 + Math.random() * 1.5,
        vx: 0.08 + Math.random() * 0.20,
        vy: -0.08 + Math.random() * 0.14,
        hue: index % 3,
        phase: Math.random() * Math.PI * 2,
      }))

      state.ribbons = Array.from({ length: 4 }, (_, index) => ({
        y: state.height * (0.26 + index * 0.15),
        amp: 34 + Math.random() * 56,
        speed: 0.00026 + Math.random() * 0.00020,
        phase: Math.random() * Math.PI * 2,
      }))
    }

    function draw(time = 0) {
      ctx.clearRect(0, 0, state.width, state.height)
      ctx.globalCompositeOperation = 'screen'

      const max = Math.max(state.width, state.height)
      const lights = [
        {
          x: state.width * (0.56 + Math.sin(time * 0.00018) * 0.09),
          y: state.height * (0.48 + Math.cos(time * 0.00016) * 0.08),
          r: max * 0.54,
          stops: ['rgba(225, 85, 255, 0.32)', 'rgba(142, 64, 255, 0.18)', 'rgba(0,0,0,0)'],
        },
        {
          x: state.width * (0.72 + Math.cos(time * 0.00015) * 0.08),
          y: state.height * (0.24 + Math.sin(time * 0.00017) * 0.06),
          r: max * 0.42,
          stops: ['rgba(255, 103, 222, 0.28)', 'rgba(187, 71, 255, 0.12)', 'rgba(0,0,0,0)'],
        },
        {
          x: state.width * (0.58 + Math.sin(time * 0.00014 + 2) * 0.10),
          y: state.height * (0.86 + Math.cos(time * 0.00012) * 0.06),
          r: max * 0.48,
          stops: ['rgba(69, 101, 255, 0.28)', 'rgba(57, 132, 255, 0.12)', 'rgba(0,0,0,0)'],
        },
      ]

      lights.forEach((light) => {
        const glow = ctx.createRadialGradient(light.x, light.y, 0, light.x, light.y, light.r)
        glow.addColorStop(0, light.stops[0])
        glow.addColorStop(0.44, light.stops[1])
        glow.addColorStop(1, light.stops[2])
        ctx.fillStyle = glow
        ctx.fillRect(0, 0, state.width, state.height)
      })

      state.ribbons.forEach((ribbon) => {
        const gradient = ctx.createLinearGradient(0, 0, state.width, 0)
        gradient.addColorStop(0, 'rgba(87, 142, 255, 0)')
        gradient.addColorStop(0.34, 'rgba(99, 135, 255, 0.08)')
        gradient.addColorStop(0.58, 'rgba(217, 91, 255, 0.12)')
        gradient.addColorStop(1, 'rgba(255, 104, 220, 0)')

        ctx.beginPath()
        for (let x = -100; x <= state.width + 100; x += 28) {
          const y = ribbon.y
            + Math.sin(x * 0.006 + time * ribbon.speed + ribbon.phase) * ribbon.amp
            + Math.cos(x * 0.003 + time * ribbon.speed * 1.8) * 18
          if (x === -80) ctx.moveTo(x, y)
          else ctx.lineTo(x, y)
        }
        ctx.strokeStyle = gradient
        ctx.lineWidth = 2
        ctx.shadowColor = 'rgba(178, 69, 255, 0.36)'
        ctx.shadowBlur = 34
        ctx.stroke()
      })

      state.points.forEach((point) => {
        point.x += point.vx
        point.y += point.vy + Math.sin(time * 0.001 + point.phase) * 0.10
        if (point.x > state.width + 30) point.x = -30
        if (point.y < -30) point.y = state.height + 30
        if (point.y > state.height + 30) point.y = -30

        const alpha = 0.10 + Math.sin(time * 0.0016 + point.phase) * 0.08
        const color = point.hue === 0
          ? `rgba(116, 162, 255, ${alpha})`
          : point.hue === 1
            ? `rgba(213, 96, 255, ${alpha})`
            : `rgba(255, 120, 224, ${alpha})`

        ctx.beginPath()
        ctx.arc(point.x, point.y, point.r, 0, Math.PI * 2)
        ctx.fillStyle = color
        ctx.shadowColor = color
        ctx.shadowBlur = 14
        ctx.fill()
      })

      ctx.shadowBlur = 0
      if (!reduced) requestAnimationFrame(draw)
    }

    function restart() {
      if (raf) cancelAnimationFrame(raf)
      resize()
      seed()
      draw(0)
    }

    window.addEventListener('resize', restart)

    resize()
    seed()
    draw(0)
  </script>
</body>
</html>
