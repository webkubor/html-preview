<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>聚合主流大模型 · 构建企业级 AI 用量治理体系</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
    background: #0a0018;
    color: #fff;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  canvas#bg {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
  }

  .grid-overlay {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 80px 80px;
  }

  .cross-markers {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
  }

  .cross {
    position: absolute;
    width: 12px;
    height: 12px;
  }
  .cross::before, .cross::after {
    content: '';
    position: absolute;
    background: rgba(255,255,255,0.08);
  }
  .cross::before {
    width: 1px; height: 12px; left: 50%; top: 0; transform: translateX(-50%);
  }
  .cross::after {
    width: 12px; height: 1px; top: 50%; left: 0; transform: translateY(-50%);
  }

  /* top bar */
  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 4;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 6vw;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  .brand .logo {
    width: 26px;
    height: 26px;
    border-radius: 7px;
    background: linear-gradient(135deg, #c084fc, #7c3aed);
    box-shadow: 0 0 20px rgba(168,85,247,0.5);
    position: relative;
  }
  .brand .logo::after {
    content: '';
    position: absolute;
    inset: 6px;
    border-radius: 4px;
    background: rgba(255,255,255,0.85);
    clip-path: polygon(50% 0, 100% 100%, 0 100%);
  }

  .topnav {
    display: flex;
    gap: 34px;
    font-size: 13px;
    font-weight: 400;
    color: rgba(255,255,255,0.55);
  }
  .topnav span { cursor: pointer; transition: color 0.25s; }
  .topnav span:hover { color: #fff; }
  .topnav span.active { color: #fff; }

  .cta {
    padding: 9px 20px;
    border-radius: 999px;
    border: 1px solid rgba(192,132,252,0.45);
    background: rgba(124,58,237,0.18);
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    backdrop-filter: blur(8px);
    transition: background 0.25s, box-shadow 0.25s;
  }
  .cta:hover {
    background: rgba(124,58,237,0.35);
    box-shadow: 0 0 24px rgba(168,85,247,0.35);
  }

  .content {
    position: relative;
    z-index: 3;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 10vw;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    border-radius: 999px;
    border: 1px solid rgba(192,132,252,0.3);
    background: rgba(124,58,237,0.12);
    font-size: 12px;
    font-weight: 400;
    color: rgba(255,255,255,0.75);
    letter-spacing: 0.04em;
    margin-bottom: 26px;
    width: fit-content;
    backdrop-filter: blur(6px);
  }
  .badge .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #c084fc;
    box-shadow: 0 0 10px #c084fc;
  }

  .hero h1 {
    font-size: clamp(34px, 4.4vw, 68px);
    font-weight: 300;
    line-height: 1.16;
    letter-spacing: -0.01em;
    margin-bottom: 22px;
  }

  .hero h1 span {
    display: block;
  }
  .hero h1 .accent {
    background: linear-gradient(90deg, #e9d5ff, #c084fc 60%, #a855f7);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 400;
  }

  .hero .desc {
    font-size: clamp(14px, 1.25vw, 17px);
    font-weight: 300;
    color: rgba(255,255,255,0.6);
    max-width: 540px;
    line-height: 1.7;
    margin-bottom: 28px;
  }

  .hero .line {
    width: 48px;
    height: 2px;
    background: linear-gradient(90deg, #c084fc, #a855f7);
    border-radius: 1px;
    margin-bottom: 28px;
  }

  .models {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    max-width: 620px;
  }

  .chip {
    padding: 7px 14px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.03);
    font-size: 12.5px;
    font-weight: 400;
    color: rgba(255,255,255,0.7);
    backdrop-filter: blur(6px);
    transition: border-color 0.25s, color 0.25s, transform 0.25s;
  }
  .chip:hover {
    border-color: rgba(192,132,252,0.5);
    color: #fff;
    transform: translateY(-2px);
  }

  .bottom-left {
    position: fixed;
    bottom: 8vh;
    left: 10vw;
    z-index: 3;
  }

  .bottom-left .tagline {
    font-size: clamp(12px, 1.1vw, 15px);
    font-weight: 400;
    color: rgba(255,255,255,0.45);
    line-height: 1.6;
  }

  .bottom-left .features {
    margin-top: 8px;
    font-size: clamp(11px, 0.9vw, 13px);
    font-weight: 400;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.02em;
  }

  .side-nav {
    position: fixed;
    right: 6vw;
    top: 50%;
    transform: translateY(-50%);
    z-index: 3;
    display: flex;
    flex-direction: column;
  }

  .nav-item {
    padding: 18px 0;
    cursor: pointer;
    transition: opacity 0.3s;
    opacity: 0.4;
  }

  .nav-item.active {
    opacity: 1;
  }

  .nav-item:hover {
    opacity: 0.8;
  }

  .nav-item .num {
    font-size: clamp(22px, 2.5vw, 32px);
    font-weight: 300;
    color: rgba(255,255,255,0.7);
    line-height: 1;
  }

  .nav-item.active .num {
    color: #fff;
  }

  .nav-item .label {
    font-size: clamp(11px, 0.9vw, 13px);
    font-weight: 400;
    color: rgba(255,255,255,0.35);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .nav-item.active .label {
    color: rgba(255,255,255,0.6);
  }

  .nav-divider {
    width: 32px;
    height: 1px;
    background: rgba(255,255,255,0.08);
    margin: 0 auto;
  }

  .scroll-hint {
    position: fixed;
    bottom: 8vh;
    right: 6vw;
    z-index: 3;
    writing-mode: vertical-rl;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
  }

  @media (max-width: 768px) {
    .topnav { display: none; }
    .side-nav { right: 4vw; }
    .content { padding: 0 8vw; }
    .bottom-left { left: 8vw; }
  }
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="grid-overlay"></div>

<div class="cross-markers" id="crossMarkers"></div>

<div class="topbar">
  <div class="brand">
    <div class="logo"></div>
    <span>AI Gateway</span>
  </div>
  <div class="topnav">
    <span class="active">产品</span>
    <span>解决方案</span>
    <span>定价</span>
    <span>文档</span>
  </div>
  <button class="cta">开始使用</button>
</div>

<div class="content">
  <div class="hero">
    <div class="badge"><span class="dot"></span>企业级 AI 网关 · 统一接入</div>
    <h1>
      <span>聚合主流大模型</span>
      <span class="accent">构建企业级 AI 用量治理体系</span>
    </h1>
    <div class="desc">一个网关，接入全球与国内主流大模型。统一鉴权、按团队/项目精细管控用量与成本，让企业的每一次 AI 调用都可观测、可治理、可扩展。</div>
    <div class="line"></div>
    <div class="models">
      <div class="chip">GPT-4o</div>
      <div class="chip">Claude 3.5</div>
      <div class="chip">Gemini 1.5</div>
      <div class="chip">DeepSeek</div>
      <div class="chip">通义千问</div>
      <div class="chip">文心一言</div>
      <div class="chip">智谱 GLM</div>
      <div class="chip">+ 更多</div>
    </div>
  </div>
</div>

<div class="bottom-left">
  <div class="tagline">一站式 AI 网关<br>统一管理与治理</div>
  <div class="features">安全 &nbsp;•&nbsp; 可靠 &nbsp;•&nbsp; 面向未来</div>
</div>

<div class="side-nav">
  <div class="nav-item active" data-i="0">
    <div class="num">01</div>
    <div class="label">聚合</div>
  </div>
  <div class="nav-divider"></div>
  <div class="nav-item" data-i="1">
    <div class="num">02</div>
    <div class="label">治理</div>
  </div>
  <div class="nav-divider"></div>
  <div class="nav-item" data-i="2">
    <div class="num">03</div>
    <div class="label">监控</div>
  </div>
  <div class="nav-divider"></div>
  <div class="nav-item" data-i="3">
    <div class="num">04</div>
    <div class="label">扩展</div>
  </div>
</div>

<div class="scroll-hint">SCROLL</div>

<script>
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let W, H, mouse = { x: 0.5, y: 0.5 };

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

document.addEventListener('mousemove', e => {
  mouse.x = e.clientX / W;
  mouse.y = e.clientY / H;
});

const crosses = document.getElementById('crossMarkers');
for (let gx = 0; gx < 18; gx++) {
  for (let gy = 0; gy < 12; gy++) {
    const c = document.createElement('div');
    c.className = 'cross';
    c.style.left = (gx * 80 + 40) + 'px';
    c.style.top = (gy * 80 + 40) + 'px';
    crosses.appendChild(c);
  }
}

document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    item.classList.add('active');
  });
});

// --- Data streams + click ripple ---
const chars = '01アイウエオカキクケコサシスセソタチツテト∞∑∂√∫≈≠±×÷';
const fontSize = 14;
let cols, streams;

function initStreams() {
  cols = Math.ceil(W / fontSize);
  streams = [];
  for (let i = 0; i < cols; i++) {
    streams.push({
      x: i * fontSize,
      y: Math.random() * H * -1,
      speed: 0.4 + Math.random() * 0.8,
      chars: [],
      len: 8 + Math.floor(Math.random() * 16),
      delay: Math.random() * 200
    });
    const s = streams[i];
    for (let j = 0; j < s.len; j++) {
      s.chars.push({
        char: chars[Math.floor(Math.random() * chars.length)],
        changeTimer: 0,
        changeRate: 30 + Math.floor(Math.random() * 60)
      });
    }
  }
}
initStreams();
window.addEventListener('resize', () => { W = canvas.width = innerWidth; H = canvas.height = innerHeight; initStreams(); });

const ripples = [];
canvas.addEventListener('click', e => {
  ripples.push({ x: e.clientX, y: e.clientY, r: 0, maxR: 300, opacity: 0.6, speed: 3 });
});

function draw(t) {
  ctx.clearRect(0, 0, W, H);

  // dark base
  ctx.fillStyle = '#06000f';
  ctx.fillRect(0, 0, W, H);

  // subtle radial glow
  const bg = ctx.createRadialGradient(W * 0.5, H * 0.4, 0, W * 0.5, H * 0.4, W * 0.6);
  bg.addColorStop(0, 'rgba(26,5,51,0.6)');
  bg.addColorStop(1, 'rgba(6,0,15,0)');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // draw data streams
  ctx.font = fontSize + 'px monospace';
  const time = t * 0.001;

  for (const s of streams) {
    s.y += s.speed;
    if (s.y - s.len * fontSize > H) {
      s.y = -s.len * fontSize;
      s.speed = 0.4 + Math.random() * 0.8;
    }

    for (let j = 0; j < s.len; j++) {
      const cy = s.y - j * fontSize;
      if (cy < -fontSize || cy > H + fontSize) continue;

      const ch = s.chars[j];
      ch.changeTimer++;
      if (ch.changeTimer >= ch.changeRate) {
        ch.char = chars[Math.floor(Math.random() * chars.length)];
        ch.changeTimer = 0;
      }

      // head is brightest, tail fades
      const headFade = j === 0 ? 1 : Math.pow(0.82, j);
      const alpha = headFade * 0.55;

      // ripple distortion
      let rx = 0, ry = 0;
      for (const rp of ripples) {
        const dx = s.x - rp.x;
        const dy = cy - rp.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const diff = Math.abs(dist - rp.r);
        if (diff < 60) {
          const wave = Math.cos(diff / 60 * Math.PI * 0.5) * rp.opacity;
          rx += (dx / (dist + 1)) * wave * 12;
          ry += (dy / (dist + 1)) * wave * 12;
        }
      }

      // color: head purple-white, tail deep blue
      if (j === 0) {
        ctx.fillStyle = `rgba(192,132,252,${alpha})`;
      } else if (j < 3) {
        ctx.fillStyle = `rgba(139,92,246,${alpha})`;
      } else {
        ctx.fillStyle = `rgba(79,70,229,${alpha})`;
      }

      ctx.fillText(ch.char, s.x + rx, cy + ry);
    }
  }

  // draw ripple rings
  for (let i = ripples.length - 1; i >= 0; i--) {
    const rp = ripples[i];
    rp.r += rp.speed;
    rp.opacity -= 0.008;

    if (rp.opacity <= 0 || rp.r > rp.maxR) {
      ripples.splice(i, 1);
      continue;
    }

    ctx.strokeStyle = `rgba(168,85,247,${rp.opacity * 0.5})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(rp.x, rp.y, rp.r, 0, Math.PI * 2);
    ctx.stroke();

    ctx.strokeStyle = `rgba(192,132,252,${rp.opacity * 0.25})`;
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.arc(rp.x, rp.y, rp.r * 0.7, 0, Math.PI * 2);
    ctx.stroke();
  }

  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
</script>
</body>
</html>
